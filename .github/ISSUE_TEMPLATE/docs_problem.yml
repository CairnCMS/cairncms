name: Documentation Problem
description: Report an issue with documentation content.
labels: Documentation
body:
  - type: markdown
    attributes:
      value: |
          # Thanks for reporting an issue with our docs 📚

          Documentation problems might be grammatical issues, typos, unclear wording, or outdated/irrelevant information.
          Please provide details regarding the documentation, including where it is located.
  - type: input
    attributes:
      label: Page
      description: A direct link to the page with the problem
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the Inaccuracy
      description: A clear and concise description of what the problem is
    validations:
      required: true
