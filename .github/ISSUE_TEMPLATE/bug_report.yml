name: Bug Report
description: Create a bug report for CairnCMS.
body:
  - type: markdown
    attributes:
      value: |
        # Thanks for filing a bug report 🐛

        Before starting, make sure that you're using the latest versions of all packages.

  - type: textarea
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: To Reproduce
      description:
        Steps to reproduce the behavior. Contributors should be able to follow the steps provided in order to reproduce
        the bug.
    validations:
      required: true
  - type: input
    attributes:
      label: CairnCMS Version
      placeholder: v1.x.x
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Hosting Strategy
      options:
        - Self-Hosted (Docker Image)
        - Self-Hosted (Custom)
    validations:
      required: true
