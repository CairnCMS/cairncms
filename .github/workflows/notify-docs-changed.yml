name: Notify Docs Changed

on:
  push:
    branches: [main]
    paths: ['docs/**']

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.FRONTEND_REPO_PAT }}
          repository: CairnCMS/cairncms-website
          event-type: docs-changed
          client-payload: |
            {
              "sha": "${{ github.sha }}"
            }
