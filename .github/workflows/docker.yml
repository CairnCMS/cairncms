name: Docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0-beta.1). Workflow checks out the matching v<version> tag.'
        required: true
        type: string
      update_channel_alias:
        description: 'Also push the beta/latest alias. Off by default so historical rebuilds do not move aliases backward. Turn on only when seeding a fresh registry or intentionally republishing the current channel target.'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Skip the push step. Verifies checkout, multi-arch build, tag computation, and credential handshake. Does NOT exercise push authorization, only a real publish proves those.'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Determine version and ref
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
            REF="refs/tags/v$VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            REF="$GITHUB_REF"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cairncms
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: |
            cairncms/cairncms
            ghcr.io/cairncms/cairncms
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}
            type=raw,value=${{ steps.meta.outputs.channel }},enable=${{ github.event_name == 'push' || inputs.update_channel_alias }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}
